<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --accent: #246b5b;
      --accent-soft: #e5f2ee;
      --code-bg: #101820;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 32px max(24px, calc((100vw - 1120px) / 2));
    }
    main {
      width: min(1120px, calc(100vw - 48px));
      margin: 24px auto 48px;
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr;
      gap: 24px;
      align-items: start;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 20px;
      letter-spacing: 0;
    }
    h3 {
      margin: 18px 0 8px;
      font-size: 16px;
      letter-spacing: 0;
    }
    p { margin: 8px 0; }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    pre {
      overflow: auto;
      padding: 14px;
      color: #edf2f7;
      background: var(--code-bg);
      border-radius: 8px;
    }
    nav, section, .meta, .visual {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    nav {
      position: sticky;
      top: 16px;
      padding: 16px;
    }
    nav a {
      display: block;
      color: var(--accent);
      text-decoration: none;
      padding: 6px 0;
    }
    nav a:hover { text-decoration: underline; }
    .content {
      display: grid;
      gap: 16px;
    }
    section {
      padding: 20px;
    }
    .subtitle, .muted {
      color: var(--muted);
    }
    .meta {
      padding: 14px 16px;
      display: grid;
      gap: 6px;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      margin: 0 8px 8px 0;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 13px;
    }
    ul {
      margin: 8px 0 0;
      padding-left: 22px;
    }
    .file-list {
      display: grid;
      gap: 8px;
      padding-left: 0;
      list-style: none;
    }
    .file-list li {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .visual {
      overflow: hidden;
    }
    .visual img {
      display: block;
      width: 100%;
      height: auto;
      background: #eef1f5;
    }
    .visual figcaption {
      padding: 12px 14px;
      color: var(--muted);
    }
    footer {
      width: min(1120px, calc(100vw - 48px));
      margin: 0 auto 32px;
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
      nav {
        position: static;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>{{heading}}</h1>
    {{subtitle}}
  </header>
  <main>
    <nav aria-label="Summary sections">
      {{nav}}
    </nav>
    <div class="content">
      {{meta}}
      {{visuals}}
      {{sections}}
      {{blind_spots}}
    </div>
  </main>
  <footer>{{footer}}</footer>
</body>
</html>
